pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: bun run biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bun run typecheck
    - name: determinism-guard
      glob: "src/game/**/*.{ts,tsx}"
      run: bun run guard:determinism

pre-push:
  parallel: true
  jobs:
    - name: test
      run: bun run test:run
